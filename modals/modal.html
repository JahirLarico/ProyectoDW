<!--
    Modal convertido al componente .modal nativo de Bootstrap 5.
    - .modal fade            → animación de Bootstrap (reemplaza el keyframe propio)
    - .modal-dialog-centered → centrado vertical sin CSS extra
    - data-bs-dismiss="modal" en la X y en cancelar
    Se inyecta en el <body> con fetch desde modal.js (igual que antes).
-->
<div class="modal fade" id="product-modal" tabindex="-1" aria-labelledby="modal-title" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content">

            <div class="modal-header">
                <h2 class="modal-title h4" id="modal-title"></h2>
                <!-- Botón cerrar estándar de Bootstrap -->
                <button type="button" class="btn-close close-modal" data-bs-dismiss="modal" aria-label="Cerrar"></button>
            </div>

            <div class="modal-body text-center">
                <img id="modal-image" src="" alt="Producto" class="img-fluid rounded mb-3">
                <p id="modal-price" class="fs-5 fw-bold"></p>
                <p id="modal-description" class="text-muted"></p>
            </div>

            <div class="modal-footer">
                <button id="modal-cart-btn" class="btn w-100 modal-cart-btn">Agregar al carrito</button>
            </div>
        </div>
    </div>
</div>
