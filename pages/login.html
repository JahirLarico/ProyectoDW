<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mobify</title>

    <!-- Bootstrap 5.3.8 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/loginStyle.css">
    <link rel="stylesheet" href="../css/notificationStyle.css">
</head>

<body>
    <!--
        Layout centrado usando utilidades de Bootstrap (min-vh-100, d-flex, etc.)
        en lugar de un body con display:flex hardcodeado. Más mantenible y
        coherente con el resto del proyecto.
    -->
    <main class="login-container container-fluid min-vh-100 d-flex align-items-center justify-content-center py-4">
        <!-- .card de Bootstrap como componente base del formulario -->
        <div class="login-card card shadow-lg p-4 p-md-5 w-100" style="max-width: 420px;">
            <h1 class="text-center mb-4 h3">Iniciar Sesión</h1>

            <form>
                <!-- mb-3 + form-label + form-control: patrón estándar de formularios Bootstrap -->
                <div class="mb-3 input-group-custom">
                    <label for="email" class="form-label">Correo</label>
                    <input type="email" id="email" class="form-control" placeholder="correo@ejemplo.com" required>
                </div>

                <div class="mb-3 input-group-custom">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" id="password" class="form-control" placeholder="********" required>
                </div>

                <button type="submit" class="btn w-100 login-btn">Ingresar</button>

                <p class="register text-center mt-3 mb-0">
                    ¿No tienes cuenta?
                    <a href="javascript:void(0)" onclick="showNotification('Registro exitoso', 'success')">
                        Regístrate
                    </a>
                </p>
            </form>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="../js/notification.js"></script>
</body>

</html>
